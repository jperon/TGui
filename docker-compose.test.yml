services:
  tarantool-test:
    container_name: tgui-tarantool-test
    build: .
    command: tarantool /app/backend/init.lua
    volumes:
      - ./backend:/app/backend:ro
      - ./frontend:/app/frontend:ro
      - ./schema:/app/schema:ro
      - ./tests:/app/tests:ro
      - tgui_test_data:/var/lib/tarantool
    ports:
      - "3302:3301"
      - "8081:8080"
    environment:
      TT_LOG_LEVEL: "5"
      TGUI_TEST_ENV: "true"

volumes:
  tgui_test_data:
